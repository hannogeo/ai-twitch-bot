name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter groq duckduckgo-search requests
        
    - name: Build Directory Structure
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "AIChatbot" --collect-all customtkinter --add-data "version.json;." main.py
        
    - name: Zip the Output
      run: |
        Compress-Archive -Path dist\AIChatbot\* -DestinationPath dist\AIChatbot.zip
        
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/AIChatbot.zip
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
