name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka zstandard customtkinter groq duckduckgo-search requests
        
    - name: Build Executable pipeline (Nuitka C-Compiler)
      run: |
        python -m nuitka --assume-yes-for-downloads --standalone --onefile --windows-console-mode=disable --enable-plugin=tk-inter --include-package-data=customtkinter --output-dir=dist --output-filename=AIChatbot.exe main.py
        
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/AIChatbot.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
